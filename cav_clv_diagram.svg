<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 445" font-family="'Courier New', Courier, monospace">
  <defs>
    <radialGradient id="dg" cx="40%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#383838"/>
      <stop offset="60%"  stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#0e0e0e"/>
    </radialGradient>
    <clipPath id="cL">
      <circle cx="205" cy="228" r="158"/>
    </clipPath>
    <clipPath id="cR">
      <circle cx="615" cy="228" r="158"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="820" height="445" fill="#0c0c0c"/>

  <!-- Title -->
  <text x="410" y="27" text-anchor="middle" fill="#c8c8c8" font-size="14" font-weight="bold" letter-spacing="1">LaserDisc Track Patterns — CAV vs CLV</text>

  <!-- ══════════════ CAV DISC (left, centre 205,228) ══════════════ -->
  <circle cx="205" cy="228" r="158" fill="url(#dg)" stroke="#2e2e2e" stroke-width="1.5"/>
  <g clip-path="url(#cL)">
    <!-- Concentric tracks, alternating tinted colours to suggest iridescence -->
    <circle cx="205" cy="228" r="155" fill="none" stroke="#3c6e8c" stroke-width="1.3" opacity="0.85"/>
    <circle cx="205" cy="228" r="148" fill="none" stroke="#3c8c6e" stroke-width="1.2" opacity="0.80"/>
    <circle cx="205" cy="228" r="141" fill="none" stroke="#8c6e3c" stroke-width="1.2" opacity="0.80"/>
    <circle cx="205" cy="228" r="134" fill="none" stroke="#6e3c8c" stroke-width="1.2" opacity="0.80"/>
    <circle cx="205" cy="228" r="127" fill="none" stroke="#3c6e8c" stroke-width="1.2" opacity="0.80"/>
    <circle cx="205" cy="228" r="120" fill="none" stroke="#3c8c6e" stroke-width="1.2" opacity="0.80"/>
    <circle cx="205" cy="228" r="113" fill="none" stroke="#8c6e3c" stroke-width="1.2" opacity="0.80"/>
    <circle cx="205" cy="228" r="106" fill="none" stroke="#6e3c8c" stroke-width="1.2" opacity="0.80"/>
    <circle cx="205" cy="228" r="99"  fill="none" stroke="#3c6e8c" stroke-width="1.2" opacity="0.80"/>
    <circle cx="205" cy="228" r="92"  fill="none" stroke="#3c8c6e" stroke-width="1.2" opacity="0.80"/>
    <circle cx="205" cy="228" r="85"  fill="none" stroke="#8c6e3c" stroke-width="1.2" opacity="0.80"/>
    <circle cx="205" cy="228" r="78"  fill="none" stroke="#6e3c8c" stroke-width="1.2" opacity="0.80"/>
    <circle cx="205" cy="228" r="71"  fill="none" stroke="#3c6e8c" stroke-width="1.2" opacity="0.80"/>
    <circle cx="205" cy="228" r="64"  fill="none" stroke="#3c8c6e" stroke-width="1.2" opacity="0.80"/>
    <circle cx="205" cy="228" r="57"  fill="none" stroke="#8c6e3c" stroke-width="1.2" opacity="0.80"/>
    <circle cx="205" cy="228" r="50"  fill="none" stroke="#6e3c8c" stroke-width="1.2" opacity="0.80"/>

    <!--
      Frame-boundary spokes: each revolution of a CAV disc = exactly 1 frame.
      All adjacent tracks share the same frame-start angle, producing radial marks
      visible as "spokes" when the disc is viewed under light.
      12 spokes shown here (every 30°) for clarity; a real disc has one per frame.

      Spoke endpoints calculated for cx=205, cy=228:
        x = 205 + r·sin(θ),  y = 228 − r·cos(θ)
      Inner r = 34 (hub edge), outer r = 170 (clipped to disc edge at r=158).
    -->
    <!-- θ=0°   --> <line x1="205"   y1="194"   x2="205"   y2="58"    stroke="#c0c0c0" stroke-width="1.1" opacity="0.60"/>
    <!-- θ=30°  --> <line x1="222"   y1="198.6" x2="290"   y2="80.8"  stroke="#c0c0c0" stroke-width="1.1" opacity="0.60"/>
    <!-- θ=60°  --> <line x1="234.4" y1="211"   x2="352.2" y2="143"   stroke="#c0c0c0" stroke-width="1.1" opacity="0.60"/>
    <!-- θ=90°  --> <line x1="239"   y1="228"   x2="375"   y2="228"   stroke="#c0c0c0" stroke-width="1.1" opacity="0.60"/>
    <!-- θ=120° --> <line x1="234.4" y1="245"   x2="352.2" y2="313"   stroke="#c0c0c0" stroke-width="1.1" opacity="0.60"/>
    <!-- θ=150° --> <line x1="222"   y1="257.4" x2="290"   y2="375.2" stroke="#c0c0c0" stroke-width="1.1" opacity="0.60"/>
    <!-- θ=180° --> <line x1="205"   y1="262"   x2="205"   y2="398"   stroke="#c0c0c0" stroke-width="1.1" opacity="0.60"/>
    <!-- θ=210° --> <line x1="188"   y1="257.4" x2="120"   y2="375.2" stroke="#c0c0c0" stroke-width="1.1" opacity="0.60"/>
    <!-- θ=240° --> <line x1="175.6" y1="245"   x2="57.8"  y2="313"   stroke="#c0c0c0" stroke-width="1.1" opacity="0.60"/>
    <!-- θ=270° --> <line x1="171"   y1="228"   x2="35"    y2="228"   stroke="#c0c0c0" stroke-width="1.1" opacity="0.60"/>
    <!-- θ=300° --> <line x1="175.6" y1="211"   x2="57.8"  y2="143"   stroke="#c0c0c0" stroke-width="1.1" opacity="0.60"/>
    <!-- θ=330° --> <line x1="188"   y1="198.6" x2="120"   y2="80.8"  stroke="#c0c0c0" stroke-width="1.1" opacity="0.60"/>
  </g>
  <!-- Hub drawn after clip group so it masks spoke centres -->
  <circle cx="205" cy="228" r="34" fill="#0c0c0c"/>
  <circle cx="205" cy="228" r="9"  fill="#242424" stroke="#383838" stroke-width="1"/>

  <!-- CAV labels -->
  <text x="205" y="412" text-anchor="middle" fill="#ffffff" font-size="19" font-weight="bold" letter-spacing="3">CAV</text>
  <text x="205" y="430" text-anchor="middle" fill="#787878" font-size="11">Constant Angular Velocity</text>
  <text x="205" y="444" text-anchor="middle" fill="#787878" font-size="11">1 revolution = 1 frame</text>

  <!-- Callout: frame boundary spoke.
       Annotation point (268, 118) lies on the θ=30° spoke line
       (verified: t≈0.69 along the segment from (222,199) to (290,81)). -->
  <line x1="268" y1="118" x2="322" y2="82" stroke="#f0b030" stroke-width="0.9" stroke-dasharray="3,2"/>
  <circle cx="268" cy="118" r="2.5" fill="#f0b030"/>
  <text x="325" y="79"  fill="#f0b030" font-size="11">frame boundary</text>
  <text x="325" y="92"  fill="#f0b030" font-size="11">spoke</text>


  <!-- ══════════════ CLV DISC (right, centre 615,228) ══════════════ -->
  <circle cx="615" cy="228" r="158" fill="url(#dg)" stroke="#2e2e2e" stroke-width="1.5"/>
  <g clip-path="url(#cR)">
    <!-- Same concentric tracks — NO radial spokes -->
    <circle cx="615" cy="228" r="155" fill="none" stroke="#3c6e8c" stroke-width="1.3" opacity="0.85"/>
    <circle cx="615" cy="228" r="148" fill="none" stroke="#3c8c6e" stroke-width="1.2" opacity="0.80"/>
    <circle cx="615" cy="228" r="141" fill="none" stroke="#8c6e3c" stroke-width="1.2" opacity="0.80"/>
    <circle cx="615" cy="228" r="134" fill="none" stroke="#6e3c8c" stroke-width="1.2" opacity="0.80"/>
    <circle cx="615" cy="228" r="127" fill="none" stroke="#3c6e8c" stroke-width="1.2" opacity="0.80"/>
    <circle cx="615" cy="228" r="120" fill="none" stroke="#3c8c6e" stroke-width="1.2" opacity="0.80"/>
    <circle cx="615" cy="228" r="113" fill="none" stroke="#8c6e3c" stroke-width="1.2" opacity="0.80"/>
    <circle cx="615" cy="228" r="106" fill="none" stroke="#6e3c8c" stroke-width="1.2" opacity="0.80"/>
    <circle cx="615" cy="228" r="99"  fill="none" stroke="#3c6e8c" stroke-width="1.2" opacity="0.80"/>
    <circle cx="615" cy="228" r="92"  fill="none" stroke="#3c8c6e" stroke-width="1.2" opacity="0.80"/>
    <circle cx="615" cy="228" r="85"  fill="none" stroke="#8c6e3c" stroke-width="1.2" opacity="0.80"/>
    <circle cx="615" cy="228" r="78"  fill="none" stroke="#6e3c8c" stroke-width="1.2" opacity="0.80"/>
    <circle cx="615" cy="228" r="71"  fill="none" stroke="#3c6e8c" stroke-width="1.2" opacity="0.80"/>
    <circle cx="615" cy="228" r="64"  fill="none" stroke="#3c8c6e" stroke-width="1.2" opacity="0.80"/>
    <circle cx="615" cy="228" r="57"  fill="none" stroke="#8c6e3c" stroke-width="1.2" opacity="0.80"/>
    <circle cx="615" cy="228" r="50"  fill="none" stroke="#6e3c8c" stroke-width="1.2" opacity="0.80"/>
  </g>
  <!-- Hub -->
  <circle cx="615" cy="228" r="34" fill="#0c0c0c"/>
  <circle cx="615" cy="228" r="9"  fill="#242424" stroke="#383838" stroke-width="1"/>

  <!-- CLV labels -->
  <text x="615" y="412" text-anchor="middle" fill="#ffffff" font-size="19" font-weight="bold" letter-spacing="3">CLV</text>
  <text x="615" y="430" text-anchor="middle" fill="#787878" font-size="11">Constant Linear Velocity</text>
  <text x="615" y="444" text-anchor="middle" fill="#787878" font-size="11">variable rotation speed</text>

  <!-- Callout: no radial markers -->
  <line x1="502" y1="162" x2="530" y2="185" stroke="#7090e0" stroke-width="0.9" stroke-dasharray="3,2"/>
  <circle cx="530" cy="185" r="2.5" fill="#7090e0"/>
  <text x="390" y="151" fill="#7090e0" font-size="11">uniform appearance —</text>
  <text x="390" y="164" fill="#7090e0" font-size="11">no radial markers</text>

  <!-- Centre divider -->
  <line x1="410" y1="44" x2="410" y2="400" stroke="#282828" stroke-width="1" stroke-dasharray="5,4"/>
</svg>
